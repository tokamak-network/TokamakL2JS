name: Publish npm on version bump

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Detect version increase vs npm registry
        id: version_check
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          ERR_LOG="$(mktemp)"
          trap 'rm -f "${ERR_LOG}"' EXIT

          if npm view "${PACKAGE_NAME}" version --json >"${ERR_LOG}" 2>&1; then
            NPM_LATEST="$(node -e "const raw=require('fs').readFileSync(process.argv[1],'utf8').trim(); const parsed=JSON.parse(raw); console.log(Array.isArray(parsed) ? parsed.at(-1) : parsed);" "${ERR_LOG}")"
          else
            if grep -qiE 'E404|Not Found|404' "${ERR_LOG}"; then
              echo "publish=true" >> "$GITHUB_OUTPUT"
              echo "reason=Package not found on npm; first publish allowed (${CURRENT_VERSION})." >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "reason=Failed to query npm latest version for ${PACKAGE_NAME}." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${NPM_LATEST:-}" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "reason=Could not parse npm latest version for ${PACKAGE_NAME}." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if node - "${NPM_LATEST}" "${CURRENT_VERSION}" <<'NODE'
          const [published, local] = process.argv.slice(2);
          const parse = (value) => {
            const match = value.trim().match(/^v?(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-([0-9A-Za-z.-]+))?(?:\+.*)?$/);
            if (!match) return null;
            const pre = match[4]
              ? match[4].split(".").map((token) => (/^\d+$/.test(token) ? Number(token) : token))
              : [];
            return {
              major: Number(match[1]),
              minor: Number(match[2]),
              patch: Number(match[3]),
              pre
            };
          };

          const comparePre = (a, b) => {
            for (let i = 0; i < Math.max(a.length, b.length); i += 1) {
              const left = a[i];
              const right = b[i];

              if (left === undefined) return -1;
              if (right === undefined) return 1;
              if (left === right) continue;

              const leftIsNum = typeof left === "number";
              const rightIsNum = typeof right === "number";
              if (leftIsNum && rightIsNum) return left > right ? 1 : -1;
              if (leftIsNum) return -1;
              if (rightIsNum) return 1;
              return left > right ? 1 : -1;
            }
            return 0;
          };

          const compare = (a, b) => {
            for (const key of ["major", "minor", "patch"]) {
              if (a[key] !== b[key]) return a[key] > b[key] ? 1 : -1;
            }

            if (a.pre.length === 0 && b.pre.length === 0) return 0;
            if (a.pre.length === 0) return 1;
            if (b.pre.length === 0) return -1;
            return comparePre(a.pre, b.pre);
          };

          const publishedVer = parse(published);
          const localVer = parse(local);
          if (!publishedVer || !localVer) {
            process.exit(2);
          }

          process.exit(compare(localVer, publishedVer) > 0 ? 0 : 1);
          NODE
          then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "reason=Version increased vs npm (${NPM_LATEST} -> ${CURRENT_VERSION})." >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "reason=Version not higher than npm latest (${NPM_LATEST} -> ${CURRENT_VERSION})." >> "$GITHUB_OUTPUT"
          fi

      - name: Show decision
        run: echo "${{ steps.version_check.outputs.reason }}"

      - name: Install dependencies
        if: steps.version_check.outputs.publish == 'true'
        run: npm ci

      - name: Publish to npm
        if: steps.version_check.outputs.publish == 'true'
        run: npm publish --access public
